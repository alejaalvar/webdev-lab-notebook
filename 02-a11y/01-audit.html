<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Exercise 01 - Audit</title>
  </head>
  <body>
    <main>
      <h1>Credit Card Form</h1>
      <form>
        <label for="name">Name:</label><br />
        <input type="text" name="name" id="name" /><br /><br />

        <label for="address">Address:</label><br />
        <input type="text" name="address" id="address" />
        <br /><br />

        <label for="city">City:</label><br />
        <input type="text" name="city" id="city" />
        <br /><br />

        <label for="zip">Zip Code:</label><br />
        <input type="text" name="zip" id="zip" />
        <br /><br />

        <fieldset>
          <legend>Credit Card Type:</legend>
          <label for="visa">Visa</label>
          <input type="radio" name="card" value="visa" id="visa" />
          <label for="mastercard">MasterCard</label>
          <input type="radio" name="card" value="mastercard" id="mastercard" />
          <label for="amex">American Express</label>
          <input type="radio" name="card" value="amex" id="amex" /><br /><br />
        </fieldset>
        <br /><br />

        <label for="cc_number">Credit Card Number:</label>
        <input type="text" name="cc_number" id="cc_number" /><br /><br />
        <label for="cvv">CVC:</label>
        <input type="text" name="cvv" id="cvv" /><br /><br />

        <input type="button" value="Submit" />
      </form>
    </main>
  </body>
</html>
