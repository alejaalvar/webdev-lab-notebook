<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="form-body">
    <main class="form-main">
      <h1>Roth IRA Calculator</h1>
      <form action="/submitform">
        <div>
          <label for="balance">Balance ($)</label>
          <input type="text" name="balance" id="balance" />
        </div>
        <div>
          <label for="annual">Annual contribution ($)</label>
          <input type="text" name="annual" id="annual" />
        </div>
        <fieldset>
          <legend>Maximize contribution?</legend>
          <input type="radio" name="maximize" id="yes" value="yes" />
          <label for="yes">Yes</label>
          <input type="radio" name="maximize" id="no" value="no" />
          <label for="no">No</label>
        </fieldset>
        <div>
          <label for="rate">Expected rate of return (%)</label>
          <input type="number" name="rate" id="rate" />
        </div>
        <div>
          <label for="current">Current age</label>
          <input type="number" name="current" id="current" />
        </div>
        <div>
          <label for="retire">Retirement age</label>
          <input type="number" name="retire" id="retire" />
        </div>
        <div>
          <label for="tax">Marginal tax rate (%)</label>
          <input type="number" name="tax" id="tax" />
        </div>
        <div>
          <input type="submit" value="Calculate" />
          <input type="reset" value="Reset" />
        </div>
      </form>
      <p>
        This exercise is a simplified version of the Roth IRA Calculator at
        <a href="https://www.calculator.net">Calculator.net</a>
      </p>
    </main>
  </body>
</html>
